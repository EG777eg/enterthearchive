<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #d5a388; }
        iframe { border: none; width: 100%; height: 100%; }
        #audio-debug-status { position: fixed; bottom: 10px; right: 10px; z-index: 999999; color: white; font-size: 10px; opacity: 0.5; pointer-events: none; font-family: monospace; }
    </style>
</head>
<body>
    <div id="audio-debug-status">Audio: Ready</div>
    <audio id="global-bg-audio" loop preload="auto">
        <source src="images/natureloop.mp3" type="audio/mpeg">
    </audio>

    <iframe id="site-frame" src="entrance.html" allow="autoplay"></iframe>

    <script>
        const audio = document.getElementById('global-bg-audio');
        const statusEl = document.getElementById('audio-debug-status');

        // Set volume
        audio.volume = 0.5;

        function startAudio() {
            console.log("Attempting to play audio...");
            audio.play().then(() => {
                console.log("Audio playing successfully.");
                statusEl.innerText = "Audio: Playing";
            }).catch(err => {
                console.warn("Audio play blocked or failed:", err);
                statusEl.innerText = "Audio: Click to enable sound";
                statusEl.style.opacity = "1";
                statusEl.style.color = "#fff";
                statusEl.style.background = "rgba(0,0,0,0.5)";
                statusEl.style.padding = "5px 10px";
                statusEl.style.borderRadius = "20px";
                statusEl.style.cursor = "pointer";
                statusEl.style.pointerEvents = "auto";
            });
        }

        window.addEventListener('message', (event) => {
            console.log("Master received message:", event.data);
            if (event.data === 'play-audio') {
                startAudio();
            }
        });

        // Allow manual trigger if autoplay is blocked
        statusEl.addEventListener('click', () => {
            startAudio();
        });
    </script>
</body>
</html>
